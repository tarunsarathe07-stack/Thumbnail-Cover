<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThumbAI — Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-ring"></div>
    <div class="loading-text">Generating your thumbnail…</div>
    <div class="loading-sub">This usually takes 10–20 seconds</div>
  </div>

  <!-- Navbar -->
  <nav class="nav">
    <div class="nav-logo">ThumbAI</div>
    <div class="nav-right">
      <span class="nav-user" id="navUser"></span>
      <button class="btn-logout" id="logoutBtn">Sign out</button>
    </div>
  </nav>

  <!-- Main content -->
  <main class="generator-layout">
    <div class="page-header fade-up">
      <h1>Create Thumbnail</h1>
      <p>Describe your thumbnail and our AI will bring it to life.</p>
    </div>

    <div class="card generator-card fade-up">
      <form class="generator-form" id="generatorForm" novalidate>

        <!-- Prompt -->
        <div class="form-group">
          <div class="prompt-actions">
            <label class="form-label" for="prompt">Your Description</label>
            <button type="button" class="btn-suggest" id="suggestBtn">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
              </svg>
              Suggest
            </button>
          </div>
          <textarea
            class="form-input form-textarea"
            id="prompt"
            name="prompt"
            placeholder="e.g. A person looking shocked at a rising stock chart, bold text saying 'I MADE ₹10 LAKH IN ONE DAY'"
            maxlength="800"
            rows="4"
          ></textarea>
          <div class="char-count"><span id="charCount">0</span> / 800</div>
        </div>

        <div class="divider"></div>

        <!-- Aspect ratio -->
        <div class="form-group">
          <label class="form-label">Aspect Ratio</label>
          <div class="ratio-group">
            <button type="button" class="ratio-btn active" data-ratio="16:9">
              ▬ 16:9<br>
              <span style="font-size:.72rem;font-weight:400;opacity:.7">YouTube</span>
            </button>
            <button type="button" class="ratio-btn" data-ratio="9:16">
              ▮ 9:16<br>
              <span style="font-size:.72rem;font-weight:400;opacity:.7">Shorts / Reels</span>
            </button>
          </div>
        </div>

        <!-- Error -->
        <div class="msg msg-error" id="genError"></div>

        <!-- Submit -->
        <div class="generate-row">
          <button class="btn btn-primary" type="submit" id="generateBtn">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
            <span id="generateBtnText">Generate Thumbnail</span>
            <span class="spinner" id="generateSpinner" style="display:none"></span>
          </button>
        </div>

      </form>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    'use strict';

    // ── Auth check ────────────────────────────────────────────────
    (async () => {
      try {
        const res = await fetch('/api/me', { credentials: 'include' });
        if (!res.ok) { window.location.href = '/login'; return; }
        const data = await res.json();
        document.getElementById('navUser').textContent = data.user || '';
      } catch {
        window.location.href = '/login';
      }
    })();

    // ── Logout ────────────────────────────────────────────────────
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/login';
    });

    // ── Prompt auto-resize ────────────────────────────────────────
    const promptEl   = document.getElementById('prompt');
    const charCount  = document.getElementById('charCount');

    function autoResize(el) {
      el.style.height    = 'auto';
      const sh           = el.scrollHeight;
      el.style.height    = Math.min(sh, 250) + 'px';
      el.style.overflowY = sh > 250 ? 'auto' : 'hidden';
    }

    promptEl.addEventListener('input', () => {
      autoResize(promptEl);
      charCount.textContent = promptEl.value.length;
    });

    // ── AI Suggest ────────────────────────────────────────────────
    const suggestBtn = document.getElementById('suggestBtn');

    suggestBtn.addEventListener('click', async () => {
      const topic = promptEl.value.trim();
      suggestBtn.disabled    = true;
      suggestBtn.textContent = 'Thinking…';

      try {
        const ratio = document.querySelector('.ratio-btn.active')?.dataset.ratio || '16:9';
        const res = await fetch('/api/suggest-prompt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ topic, aspectRatio: ratio })
        });
        const data = await res.json();
        if (data.prompt) {
          promptEl.value = data.prompt;
          autoResize(promptEl);
          charCount.textContent = data.prompt.length;
        }
      } catch {
        // silently fail — user keeps their text
      } finally {
        suggestBtn.disabled    = false;
        suggestBtn.innerHTML   = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>Suggest`;
      }
    });

    // ── Ratio buttons ─────────────────────────────────────────────
    document.querySelectorAll('.ratio-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // ── Generate ──────────────────────────────────────────────────
    const form        = document.getElementById('generatorForm');
    const errorEl     = document.getElementById('genError');
    const generateBtn = document.getElementById('generateBtn');
    const generateTxt = document.getElementById('generateBtnText');
    const generateSp  = document.getElementById('generateSpinner');
    const overlay     = document.getElementById('loadingOverlay');

    function setGenerating(on) {
      generateBtn.disabled      = on;
      generateTxt.textContent   = on ? 'Generating…' : 'Generate Thumbnail';
      generateSp.style.display  = on ? 'block' : 'none';
      overlay.classList.toggle('visible', on);
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.className   = 'msg msg-error visible';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.className = 'msg msg-error';

      const prompt = promptEl.value.trim();
      if (!prompt) { showError('Please describe what you want in your thumbnail.'); return; }

      const aspectRatio = document.querySelector('.ratio-btn.active')?.dataset.ratio || '16:9';

      setGenerating(true);

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ prompt, aspectRatio })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          showError(data.error || 'Generation failed. Please try again.');
          setGenerating(false);
          return;
        }

        // Pass result to result page via sessionStorage
        sessionStorage.setItem('thumbai_result', JSON.stringify({
          imageData:   data.imageData,
          mimeType:    data.mimeType || 'image/png',
          aspectRatio: data.aspectRatio || aspectRatio,
          prompt,
          timestamp:   new Date().toISOString()
        }));

        window.location.href = '/result.html';
      } catch (err) {
        showError('Network error. Please check your connection and try again.');
        setGenerating(false);
      }
    });
  </script>
</body>
</html>
