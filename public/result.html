<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThumbAI — Your Thumbnail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="page-body">

  <!-- Navbar -->
  <nav class="nav">
    <span class="nav-logo">ThumbAI</span>
    <div class="nav-links">
      <a class="nav-link" href="#">Features</a>
      <a class="nav-link" href="#">Examples</a>
      <a class="nav-link" href="#">Pricing</a>
      <a class="nav-link" href="#">Blog</a>
    </div>
    <div class="nav-right">
      <span class="nav-credits">⚡ 118 Credits</span>
      <button class="nav-btn" id="logoutBtn">Sign out</button>
    </div>
  </nav>

  <main class="page-inner">

    <!-- Header -->
    <div class="result-header animate-in">
      <div class="done-badge">✓ Done</div>
      <div class="result-title">Your Thumbnail is Ready</div>
      <div class="result-sub">Download it, regenerate, or create something new.</div>
    </div>

    <!-- Image frame -->
    <div class="img-frame animate-in" id="imgFrame" style="animation-delay:.08s">
      <div class="img-placeholder" id="imgPlaceholder">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24" style="opacity:.25;margin:0 auto 10px">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        No image data — go back and generate one.
      </div>
      <img id="resultImg" src="" alt="Generated thumbnail" style="display:none">
    </div>

    <!-- Thumbnail variations -->
    <div class="variations animate-in" id="variationsRow" style="animation-delay:.14s">
      <div class="variation selected-v" id="v1"><img id="v1img" src="" alt=""></div>
      <div class="variation" id="v2"><img id="v2img" src="" alt="" style="opacity:.4"></div>
      <div class="variation" id="v3"><img id="v3img" src="" alt="" style="opacity:.4"></div>
      <div class="variation" id="v4"><img id="v4img" src="" alt="" style="opacity:.4"></div>
    </div>

    <!-- Action buttons -->
    <div class="result-actions animate-in" style="animation-delay:.20s">
      <button class="btn btn-primary btn-lg" id="downloadBtn" disabled>
        ↓ Download Asset
      </button>
      <button class="btn btn-secondary btn-lg" onclick="window.location.href='/generator.html'">
        ↺ Regenerate
      </button>
    </div>

    <!-- Rating -->
    <div class="rating-bar animate-in" style="animation-delay:.24s">
      <span class="rating-label">Rate this result</span>
      <button class="rating-btn" id="likeBtn">👍 Looks great</button>
      <button class="rating-btn" id="dislikeBtn">👎 Needs work</button>
    </div>

    <!-- Prompt used -->
    <div class="prompt-card animate-in" id="promptCard" style="animation-delay:.28s;display:none">
      <div class="prompt-card-label">Prompt Used</div>
      <div class="prompt-card-text" id="promptText"></div>
    </div>

    <!-- Create another -->
    <div class="create-another animate-in" style="animation-delay:.32s">
      <a href="/generator.html">← Create another thumbnail</a>
    </div>

  </main>

  <script src="/js/app.js"></script>
  <script>
    'use strict';

    // ── Auth ──────────────────────────────────────────────────────
    (async () => {
      try {
        const r = await fetch('/api/me', { credentials: 'include' });
        if (!r.ok) { window.location.href = '/login'; return; }
      } catch { window.location.href = '/login'; }
    })();

    // ── Logout ─────────────────────────────────────────────────────
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/login';
    });

    // ── Load result ────────────────────────────────────────────────
    const raw = sessionStorage.getItem('thumbai_result');

    if (!raw) {
      window.location.href = '/generator.html';
    } else {
      const result = JSON.parse(raw);
      const src    = `data:${result.mimeType || 'image/png'};base64,${result.imageData}`;

      const imgEl       = document.getElementById('resultImg');
      const frame       = document.getElementById('imgFrame');
      const placeholder = document.getElementById('imgPlaceholder');
      const dlBtn       = document.getElementById('downloadBtn');

      // Show image
      imgEl.src            = src;
      imgEl.style.display  = 'block';
      placeholder.style.display = 'none';

      // Portrait frame
      if (result.aspectRatio === '9:16') {
        frame.classList.add('portrait');
      }

      // Variation thumbnails (same image shown as placeholders)
      ['v1img','v2img','v3img','v4img'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.src = src;
      });

      // Prompt card
      if (result.prompt) {
        document.getElementById('promptText').textContent = result.prompt;
        document.getElementById('promptCard').style.display = 'block';
      }

      // Download
      dlBtn.disabled = false;
      dlBtn.addEventListener('click', () => {
        const a    = document.createElement('a');
        a.href     = src;
        a.download = `thumbai-${Date.now()}.png`;
        a.click();
      });

      // Rating
      const likeBtn    = document.getElementById('likeBtn');
      const dislikeBtn = document.getElementById('dislikeBtn');

      likeBtn.addEventListener('click', () => {
        likeBtn.classList.toggle('liked');
        dislikeBtn.classList.remove('disliked');
      });
      dislikeBtn.addEventListener('click', () => {
        dislikeBtn.classList.toggle('disliked');
        likeBtn.classList.remove('liked');
      });
    }
  </script>
</body>
</html>
