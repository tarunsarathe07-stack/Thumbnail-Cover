<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThumbAI — AI Thumbnail Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-page">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-eyebrow fade-up">
      <span class="badge badge-accent">✦ AI-Powered</span>
    </div>
    <h1 class="hero-title fade-up">
      Thumbnails that<br><span>stop the scroll</span>
    </h1>
    <p class="hero-sub fade-up">
      Generate stunning YouTube thumbnails and cover art in seconds using advanced AI.
      Cinematic quality, zero design skills needed.
    </p>
  </section>

  <!-- Login card -->
  <section class="login-section">
    <div class="card login-card fade-up">
      <h2>Welcome back</h2>
      <p>Sign in to start creating</p>

      <form class="login-form" id="loginForm" autocomplete="off" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input
            class="form-input"
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          >
        </div>

        <div class="msg msg-error" id="loginError"></div>

        <button class="btn btn-primary btn-full" type="submit" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <span class="spinner" id="loginSpinner" style="display:none"></span>
        </button>
      </form>
    </div>
  </section>

  <!-- Feature chips -->
  <div class="features">
    <div class="feature-chip fade-up">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      Instant generation
    </div>
    <div class="feature-chip fade-up">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      16:9 &amp; 9:16 formats
    </div>
    <div class="feature-chip fade-up">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 8v4l3 3"/>
      </svg>
      Results in ~15s
    </div>
    <div class="feature-chip fade-up">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
      </svg>
      One-click download
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    'use strict';

    const form     = document.getElementById('loginForm');
    const errorEl  = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');
    const btnText  = document.getElementById('loginBtnText');
    const spinner  = document.getElementById('loginSpinner');

    function setLoading(on) {
      btn.disabled    = on;
      btnText.textContent = on ? 'Signing in…' : 'Sign In';
      spinner.style.display = on ? 'block' : 'none';
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.className   = 'msg msg-error visible';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.className = 'msg msg-error';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter both username and password.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          window.location.href = '/generator.html';
        } else {
          showError(data.error || 'Invalid credentials. Please try again.');
          setLoading(false);
        }
      } catch {
        showError('Network error. Please check your connection and try again.');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
